version: "3.9"

services:
  db:
    image: postgres:16
    container_name: clinicbox_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinicbox
      POSTGRES_USER: clinicbox
      POSTGRES_PASSWORD: clinicbox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
